<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cycle Count Counter 1</title>

  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0"></script>
  <!-- Barcode Scanner Library -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    :root {
      --primary: #3498db;
      --success: #27ae60;
      --danger: #e74c3c;
      --warning: #f39c12;
      --bg: #f4f6f8;
      --card: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: #333;
      padding: 16px;
      padding-bottom: 80px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      background: var(--card);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 24px;
      color: #2c3e50;
      font-size: 24px;
    }

    /* Camera Area */
    #reader {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
      display: none;
      background: #000;
    }

    #reader video {
      width: 100%;
      display: block;
    }

    /* Buttons */
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      transition: 0.2s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-warning {
      background: var(--warning);
      color: white;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Form Inputs */
    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
      color: #555;
    }

    .input-group input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 18px;
      transition: 0.2s;
    }

    .input-group input:focus {
      border-color: var(--primary);
      outline: none;
    }

    .input-group input:read-only {
      background: #f8f9fa;
      color: #666;
      border-color: #dadce0;
    }

    /* Status */
    #status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      display: none;
    }

    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .hidden {
      display: none !important;
    }

    .helper {
      font-size: 13px;
      color: #666;
      text-align: center;
      margin: 12px 0;
      line-height: 1.4;
    }

    /* Download Section */
    .download-section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 2px dashed #e0e0e0;
      text-align: center;
    }

    .download-section h4 {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
      font-weight: 600;
    }

    /* Debug panel */
    #debugPanel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a2e;
      color: #0f0;
      font-family: monospace;
      font-size: 11px;
      padding: 8px;
      max-height: 100px;
      overflow-y: auto;
      display: none;
      z-index: 1000;
    }

    #debugToggle {
      position: fixed;
      bottom: 5px;
      right: 5px;
      background: #333;
      color: white;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      font-size: 12px;
      cursor: pointer;
      z-index: 1001;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>📦 Cycle Count</h2>
    <h2 style="font-size: 12px;">Counter : 2</h2>

    <!-- 🔍 SCAN VIEW -->
    <div id="scanView">
      <div id="reader"></div>

      <button id="btnStart" class="btn btn-primary">
        📷 Mulai Scan Kamera
      </button>
      <button id="btnStop" class="btn btn-danger hidden">
        ⏹️ Stop Kamera
      </button>

      <p class="helper">Arahkan kamera ke barcode.<br><small>Otomatis deteksi & cari data.</small></p>
    </div>

    <!-- 📝 DATA INPUT VIEW -->
    <div id="dataView" class="hidden">
      <div class="input-group">
        <label>Part Number (SKU)</label>
        <input type="text" id="inputPartNumber" readonly>
      </div>
      <div class="input-group">
        <label>Part Description</label>
        <input type="text" id="inputDescription" readonly>
      </div>
      <div class="input-group">
        <label>🔢 Quantity (Jumlah Fisik)</label>
        <input type="number" id="inputQty" placeholder="0" inputmode="numeric" min="0">
      </div>
      <!-- TAMBAHKAN DI BAWAH INPUT QUANTITY -->
      <div class="input-group">
        <label>📍 Lokasi (Manual)</label>
        <input type="text" id="inputLokasi" placeholder="Contoh: A-01" maxlength="5" inputmode="text">
      </div>
      <button id="btnSave" class="btn btn-success">
        💾 Simpan
      </button>
      <button class="btn btn-outline" onclick="cancelScan()">
        ↩️ Batal / Scan Ulang
      </button>
    </div>

    <div id="status"></div>

    <!-- 📥 DOWNLOAD SECTION -->
    <div class="download-section">
      <h4>📊 Download Data</h4>
      <button id="btnDownload" class="btn btn-warning" onclick="downloadData()">
        📥 Download Counter 1
      </button>
       <button id="btnDownload2" class="btn btn-warning" onclick="downloadData2()">
        📥 Download Counter 2
      </button>
      <p class="helper" style="font-size:11px;margin-top:8px;">
        Download hasil cycle count sebagai file CSV (buka di Excel/Google Sheets)
      </p>
    </div>
  </div>

  <!-- Debug Panel -->
  <button id="debugToggle" onclick="toggleDebug()">●</button>
  <div id="debugPanel"></div>

  <script>
    // ==================== ⚙️ KONFIGURASI ====================
    const SUPABASE_URL = "https://vbgezqwfednyhfxqdnah.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiZ2V6cXdmZWRueWhmeHFkbmFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzE5OTksImV4cCI6MjA5MTMwNzk5OX0.6zkaT3R3sL8u4JwcLhIGBbPvXj4k_dntjy6jBuFib5o";

    const TBL_MASTER = "master_data";
    const TBL_LOG = "cycle_count_log_3";
    const TBL_LOG2 = "cycle_count_log4";
    const DEBUG = true;

    // ==================== 🛠️ DEBUG UTILS ====================
    function log(msg, type = 'info') {
      if (!DEBUG) return;
      const timestamp = new Date().toLocaleTimeString();
      const panel = document.getElementById('debugPanel');
      const line = document.createElement('div');
      line.textContent = `[${timestamp}] ${msg}`;
      line.style.color = type === 'error' ? '#f66' : type === 'success' ? '#6f6' : '#0f0';
      panel.appendChild(line);
      panel.scrollTop = panel.scrollHeight;
      console.log(`[${type.toUpperCase()}] ${msg}`);
    }

    function toggleDebug() {
      const panel = document.getElementById('debugPanel');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    // ==================== 🗄️ SUPABASE INIT ====================
    let supabase = null;
    let supabaseReady = false;

    function initSupabase() {
      try {
        if (typeof window.supabase === 'undefined') {
          throw new Error("Supabase library tidak terload.");
        }
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        supabaseReady = true;
        log("✅ Supabase client initialized", "success");
        return true;
      } catch (err) {
        log("❌ Supabase init error: " + err.message, "error");
        supabaseReady = false;
        return false;
      }
    }

    // ==================== 🎥 KAMERA FUNCTIONS ====================
    let html5QrCode = null;
    let currentData = null;

    function startCamera() {
      log("🎥 startCamera() called");
      if (!supabaseReady && !initSupabase()) {
        showStatus("⚠️ Database tidak terhubung.", "error");
        return;
      }

      const btnStart = document.getElementById('btnStart');
      const btnStop = document.getElementById('btnStop');
      const reader = document.getElementById('reader');

      btnStart.disabled = true;
      btnStart.textContent = "⏳ Memuat...";

      setTimeout(() => {
        try {
          btnStop.classList.remove('hidden');
          reader.style.display = 'block';
          html5QrCode = new Html5Qrcode("reader");
          const config = { fps: 10, qrbox: { width: 250, height: 150 } };

          html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, onScanFailure)
            .then(() => {
              log("🎥 Kamera started", "success");
              btnStart.classList.add('hidden');
              btnStart.disabled = false;
              btnStart.textContent = "📷 Mulai Scan Kamera";
            })
            .catch(err => {
              log("❌ Kamera error: " + err, "error");
              showStatus("❌ Gagal akses kamera: " + err.message, "error");
              stopCamera();
              btnStart.disabled = false;
              btnStart.textContent = "📷 Mulai Scan Kamera";
            });
        } catch (err) {
          log("❌ Exception: " + err, "error");
          showStatus("❌ Error: " + err.message, "error");
          btnStart.disabled = false;
          btnStart.textContent = "📷 Mulai Scan Kamera";
        }
      }, 100);
    }

    function stopCamera() {
      log("🎥 stopCamera() called");
      if (html5QrCode) {
        html5QrCode.stop()
          .then(() => {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('btnStart').classList.remove('hidden');
            document.getElementById('btnStop').classList.add('hidden');
          })
          .catch(err => log("⚠️ Stop error: " + err, "error"));
      }
    }

    function onScanSuccess(decodedText) {
      log("🔍 Scanned: " + decodedText, "success");
      if (html5QrCode) html5QrCode.pause(true);
      showStatus("🔍 Mencari: " + decodedText, "");
      fetchProduct(decodedText);
    }

    function onScanFailure(error) { /* Normal */ }

    // ==================== 🗄️ SUPABASE FUNCTIONS ====================

    async function fetchProduct(partNumber) {
      log("🔍 Fetching: " + partNumber);
      if (!supabaseReady) { showStatus("❌ Database tidak terhubung", "error"); return; }

      try {
        const { data, error } = await supabase
          .from(TBL_MASTER)
          .select('*')
          .eq('partnumber', partNumber)
          .single();

        if (error) {
          if (error.code === 'PGRST116') {
            showStatus("❌ Part Number tidak ditemukan", "error");
          } else throw error;
        }

        if (data) {
          log("✅ Found: " + data.partdescription, "success");
          currentData = data;
          showProductForm(currentData);
        } else {
          showStatus("❌ Part Number tidak ditemukan", "error");
          setTimeout(() => { hideStatus(); if (html5QrCode) html5QrCode.resume(); }, 2000);
        }
      } catch (err) {
        log("❌ Fetch error: " + err.message, "error");
        showStatus("❌ Error: " + err.message, "error");
        setTimeout(() => { hideStatus(); if (html5QrCode) html5QrCode.resume(); }, 2000);
      }
    }

    async function saveData() {
      const qty = document.getElementById('inputQty').value;
      if (!qty || Number(qty) < 0) { alert("⚠️ Masukkan quantity yang valid!"); return; }

      const btnSave = document.getElementById('btnSave');
      btnSave.disabled = true;
      btnSave.textContent = "⏳ Menyimpan...";
      log("💾 Saving: qty=" + qty);

      const record = {
        partnumber: currentData.partnumber,
        partdescription: currentData.partdescription,
        qty: Number(qty),
        lokasi: document.getElementById('inputLokasi').value.trim().toUpperCase(),
        operator: "Counter1"
      };

      try {
        const { data, error } = await supabase
          .from(TBL_LOG2)
          .insert([record])
          .select();

        if (error) throw error;
        log("✅ Saved", "success");
        showStatus("✅ Data berhasil disimpan!", "success");

        setTimeout(() => { resetForm(); hideStatus(); if (html5QrCode) html5QrCode.resume(); }, 1500);
      } catch (err) {
        log("❌ Save error: " + err.message, "error");
        showStatus("❌ Gagal simpan: " + err.message, "error");
      } finally {
        btnSave.disabled = false;
        btnSave.textContent = "💾 Simpan ke Supabase";
      }
    }

    // ==================== 📥 DOWNLOAD CSV FUNCTION ====================
//Counter 1
    async function downloadData() {
      const btn = document.getElementById('btnDownload');
      const originalText = btn.innerHTML;

      btn.disabled = true;
      btn.innerHTML = "⏳ Mengunduh...";
      showStatus("📥 Mengambil data dari database...", "");
      log("📥 Download started");

      try {
        if (!supabaseReady && !initSupabase()) throw new Error("Database tidak terhubung");

        // Fetch semua data dari cycle_count_counter1_log, urutkan dari terbaru
        const { data, error } = await supabase
          .from(TBL_LOG)
          .select('*')
          .order('timestamps', { ascending: false })
          .limit(1000); // Batasi 1000 record agar tidak berat

        if (error) throw error;
        if (!data || data.length === 0) {
          showStatus("⚠️ Tidak ada data untuk diunduh", "error");
          return;
        }

        log(`📊 Fetched ${data.length} records`, "success");

        // Konversi ke CSV
        const csv = convertToCSV(data);

        // Trigger download
        downloadCSV(csv, `cycle_count_counter1_${new Date().toISOString().slice(0, 10)}.csv`);

        showStatus(`✅ Berhasil mengunduh ${data.length} data!`, "success");
        log("✅ Download completed", "success");

      } catch (err) {
        log("❌ Download error: " + err.message, "error");
        showStatus("❌ Gagal download: " + err.message, "error");
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
        setTimeout(() => hideStatus(), 3000);
      }
    }

    // Helper: Convert JSON array to CSV string
    function convertToCSV(data) {
      if (!data || data.length === 0) return '';

      // Headers
      const headers = Object.keys(data[0]);
      const csvRows = [];

      // Add header row
      csvRows.push(headers.map(h => `"${h}"`).join(','));

      // Add data rows
      for (const row of data) {
        const values = headers.map(header => {
          let value = row[header];
          // Handle null/undefined
          if (value === null || value === undefined) value = '';
          // Handle dates - format nicely
          if (value instanceof Date || (typeof value === 'string' && value.includes('T'))) {
            value = new Date(value).toLocaleString('id-ID');
          }
          // Escape quotes and wrap in quotes
          value = String(value).replace(/"/g, '""');
          return `"${value}"`;
        });
        csvRows.push(values.join(','));
      }

      return csvRows.join('\n');
    }

    // Helper: Trigger file download
    function downloadCSV(csvContent, filename) {
      // Add BOM for Excel UTF-8 support (agar karakter Indonesia tidak rusak)
      const BOM = "\uFEFF";
      const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });

      // Create download link
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);

      link.setAttribute('href', url);
      link.setAttribute('download', filename);
      link.style.visibility = 'hidden';

      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      // Cleanup
      URL.revokeObjectURL(url);
      log("💾 File downloaded: " + filename, "success");
    }
    //Counter 2
    async function downloadData2() {
      const btn = document.getElementById('btnDownload2');
      const originalText = btn.innerHTML;

      btn.disabled = true;
      btn.innerHTML = "⏳ Mengunduh...";
      showStatus("📥 Mengambil data dari database...", "");
      log("📥 Download started");

      try {
        if (!supabaseReady && !initSupabase()) throw new Error("Database tidak terhubung");

        // Fetch semua data dari cycle_count_log, urutkan dari terbaru
        const { data, error } = await supabase
          .from(TBL_LOG2)
          .select('*')
          .order('timestamps', { ascending: false })
          .limit(1000); // Batasi 1000 record agar tidak berat

        if (error) throw error;
        if (!data || data.length === 0) {
          showStatus("⚠️ Tidak ada data untuk diunduh", "error");
          return;
        }

        log(`📊 Fetched ${data.length} records`, "success");

        // Konversi ke CSV
        const csv = convertToCSV(data);

        // Trigger download
        downloadCSV(csv, `cycle_count_counter2_${new Date().toISOString().slice(0, 10)}.csv`);

        showStatus(`✅ Berhasil mengunduh ${data.length} data!`, "success");
        log("✅ Download completed", "success");

      } catch (err) {
        log("❌ Download error: " + err.message, "error");
        showStatus("❌ Gagal download: " + err.message, "error");
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
        setTimeout(() => hideStatus(), 3000);
      }
    }

    // Helper: Convert JSON array to CSV string
    function convertToCSV(data) {
      if (!data || data.length === 0) return '';

      // Headers
      const headers = Object.keys(data[0]);
      const csvRows = [];

      // Add header row
      csvRows.push(headers.map(h => `"${h}"`).join(','));

      // Add data rows
      for (const row of data) {
        const values = headers.map(header => {
          let value = row[header];
          // Handle null/undefined
          if (value === null || value === undefined) value = '';
          // Handle dates - format nicely
          if (value instanceof Date || (typeof value === 'string' && value.includes('T'))) {
            value = new Date(value).toLocaleString('id-ID');
          }
          // Escape quotes and wrap in quotes
          value = String(value).replace(/"/g, '""');
          return `"${value}"`;
        });
        csvRows.push(values.join(','));
      }

      return csvRows.join('\n');
    }

    // Helper: Trigger file download
    function downloadCSV(csvContent, filename) {
      // Add BOM for Excel UTF-8 support (agar karakter Indonesia tidak rusak)
      const BOM = "\uFEFF";
      const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });

      // Create download link
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);

      link.setAttribute('href', url);
      link.setAttribute('download', filename);
      link.style.visibility = 'hidden';

      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      // Cleanup
      URL.revokeObjectURL(url);
      log("💾 File downloaded: " + filename, "success");
    }
    // ==================== 🎨 UI FUNCTIONS ====================

    function showProductForm(product) {
      document.getElementById('inputPartNumber').value = product.partnumber;
      document.getElementById('inputDescription').value = product.partdescription || '-';
      document.getElementById('inputQty').value = '';
      document.getElementById('inputLokasi').value = '';
      document.getElementById('scanView').classList.add('hidden');
      document.getElementById('dataView').classList.remove('hidden');

      setTimeout(() => document.getElementById('inputQty').focus(), 300);
      hideStatus();
    }

    function cancelScan() {
      log("↩️ Cancel");
      document.getElementById('dataView').classList.add('hidden');
      document.getElementById('scanView').classList.remove('hidden');
      currentData = null;
      if (html5QrCode) html5QrCode.resume();
      hideStatus();
    }

    function resetForm() {
      document.getElementById('dataView').classList.add('hidden');
      document.getElementById('scanView').classList.remove('hidden');
      document.getElementById('inputLokasi').value = '';
      currentData = null;
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
      el.style.display = 'block';
      log("📢 Status: " + msg, type);
    }

    function hideStatus() {
      document.getElementById('status').style.display = 'none';
    }

    // ==================== 🚀 INIT ====================

    document.addEventListener('DOMContentLoaded', () => {
      log("📄 DOM loaded");
      initSupabase();

      document.getElementById('btnStart')?.addEventListener('click', (e) => {
        e.preventDefault(); startCamera();
      });
      document.getElementById('btnStop')?.addEventListener('click', (e) => {
        e.preventDefault(); stopCamera();
      });
      document.getElementById('btnSave')?.addEventListener('click', (e) => {
        e.preventDefault(); saveData();
      });
      document.getElementById('btnDownload')?.addEventListener('click', (e) => {
        e.preventDefault(); downloadData();
      });
      document.getElementById('btnDownload2')?.addEventListener('click', (e) => {
        e.preventDefault(); downloadData2();
      });

      document.getElementById('inputQty')?.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveData(); }
      });

      log("🚀 App initialized");
    });

    window.addEventListener('beforeunload', () => {
      if (html5QrCode) html5QrCode.stop().catch(() => { });
    });
  </script>

</body>

</html>
