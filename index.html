<body>

  <script>
    // ==================== ⚙️ KONFIGURASI ====================
    const SUPABASE_URL = "https://vbgezqwfednyhfxqdnah.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiZ2V6cXdmZWRueWhmeHFkbmFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzE5OTksImV4cCI6MjA5MTMwNzk5OX0.6zkaT3R3sL8u4JwcLhIGBbPvXj4k_dntjy6jBuFib5o";

    const TBL_MASTER = "master_data";
    const TBL_LOG = "cycle_count_log_3";
    const TBL_LOG2 = "cycle_count_log4";
    const DEBUG = true;

    // ==================== 🛠️ DEBUG UTILS ====================
    function log(msg, type = 'info') {
      if (!DEBUG) return;
      const timestamp = new Date().toLocaleTimeString();
      const panel = document.getElementById('debugPanel');
      const line = document.createElement('div');
      line.textContent = `[${timestamp}] ${msg}`;
      line.style.color = type === 'error' ? '#f66' : type === 'success' ? '#6f6' : '#0f0';
      panel.appendChild(line);
      panel.scrollTop = panel.scrollHeight;
      console.log(`[${type.toUpperCase()}] ${msg}`);
    }

    function toggleDebug() {
      const panel = document.getElementById('debugPanel');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    // ==================== 🗄️ SUPABASE INIT ====================
    let supabase = null;
    let supabaseReady = false;

    function initSupabase() {
      try {
        if (typeof window.supabase === 'undefined') {
          throw new Error("Supabase library tidak terload.");
        }
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        supabaseReady = true;
        log("✅ Supabase client initialized", "success");
        return true;
      } catch (err) {
        log("❌ Supabase init error: " + err.message, "error");
        supabaseReady = false;
        return false;
      }
    }

    // ==================== 🎥 KAMERA FUNCTIONS ====================
    let html5QrCode = null;
    let currentData = null;

    function startCamera() {
      log("🎥 startCamera() called");
      if (!supabaseReady && !initSupabase()) {
        showStatus("⚠️ Database tidak terhubung.", "error");
        return;
      }

      const btnStart = document.getElementById('btnStart');
      const btnStop = document.getElementById('btnStop');
      const reader = document.getElementById('reader');

      btnStart.disabled = true;
      btnStart.textContent = "⏳ Memuat...";

      setTimeout(() => {
        try {
          btnStop.classList.remove('hidden');
          reader.style.display = 'block';
          html5QrCode = new Html5Qrcode("reader");
          const config = { fps: 10, qrbox: { width: 250, height: 150 } };

          html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, onScanFailure)
            .then(() => {
              log("🎥 Kamera started", "success");
              btnStart.classList.add('hidden');
              btnStart.disabled = false;
              btnStart.textContent = "📷 Mulai Scan Kamera";
            })
            .catch(err => {
              log("❌ Kamera error: " + err, "error");
              showStatus("❌ Gagal akses kamera: " + err.message, "error");
              stopCamera();
              btnStart.disabled = false;
              btnStart.textContent = "📷 Mulai Scan Kamera";
            });
        } catch (err) {
          log("❌ Exception: " + err, "error");
          showStatus("❌ Error: " + err.message, "error");
          btnStart.disabled = false;
          btnStart.textContent = "📷 Mulai Scan Kamera";
        }
      }, 100);
    }
    // Helper: Reset filter tanggal
    function clearDateFilter() {
      document.getElementById('filterStart').value = '';
      document.getElementById('filterEnd').value = '';
      showStatus("✅ Filter tanggal direset", "success");
      setTimeout(hideStatus, 2000);
    }

    // Helper: Bangun query dengan filter tanggal
    function buildDateQuery(query) {
      const startDate = document.getElementById('filterStart').value;
      const endDate = document.getElementById('filterEnd').value;

      // Jika start date diisi, filter >= tanggal tersebut (dari jam 00:00:00)
      if (startDate) {
        query = query.gte('timestamps', `${startDate}T00:00:00`);
      }
      // Jika end date diisi, filter <= tanggal tersebut (sampai jam 23:59:59)
      if (endDate) {
        query = query.lte('timestamps', `${endDate}T23:59:59`);
      }
      return query;
    }

    function stopCamera() {
      log("🎥 stopCamera() called");
      if (html5QrCode) {
        html5QrCode.stop()
          .then(() => {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('btnStart').classList.remove('hidden');
            document.getElementById('btnStop').classList.add('hidden');
          })
          .catch(err => log("⚠️ Stop error: " + err, "error"));
      }
    }

    function onScanSuccess(decodedText) {
      log("🔍 Scanned: " + decodedText, "success");
      if (html5QrCode) html5QrCode.pause(true);
      showStatus("🔍 Mencari: " + decodedText, "");
      fetchProduct(decodedText);
    }

    function onScanFailure(error) { /* Normal */ }

    // ==================== 🗄️ SUPABASE FUNCTIONS ====================

    async function fetchProduct(partNumber) {
      log("🔍 Fetching: " + partNumber);
      if (!supabaseReady) { showStatus("❌ Database tidak terhubung", "error"); return; }

      try {
        const { data, error } = await supabase
          .from(TBL_MASTER)
          .select('*')
          .eq('partnumber', partNumber)
          .single();

        if (error) {
          if (error.code === 'PGRST116') {
            showStatus("❌ Part Number tidak ditemukan", "error");
          } else throw error;
        }

        if (data) {
          log("✅ Found: " + data.partdescription, "success");
          currentData = data;
          showProductForm(currentData);
        } else {
          showStatus("❌ Part Number tidak ditemukan", "error");
          setTimeout(() => { hideStatus(); if (html5QrCode) html5QrCode.resume(); }, 2000);
        }
      } catch (err) {
        log("❌ Fetch error: " + err.message, "error");
        showStatus("❌ Error: " + err.message, "error");
        setTimeout(() => { hideStatus(); if (html5QrCode) html5QrCode.resume(); }, 2000);
      }
    }

    async function saveData() {
      const rawQty = document.getElementById('inputQty').value;
    
    if (!rawQty) {
      alert("⚠️ Masukkan quantity!");
      return;
    }

    const cleanQty = rawQty.replace(/\./g, '').replace(',', '.');
    const qtyValue = parseFloat(cleanQty);

    if (isNaN(qtyValue) || qtyValue < 0) {
      alert("⚠️ Format jumlah tidak valid!");
      return;
    }

      const btnSave = document.getElementById('btnSave');
      btnSave.disabled = true;
      btnSave.textContent = "⏳ Menyimpan...";
      log("💾 Saving: qty=" + qty);

      const record = {
        partnumber: currentData.partnumber,
        partdescription: currentData.partdescription,
        qty:qtyValue,
        lokasi: document.getElementById('inputLokasi').value.trim().toUpperCase(),
        operator: "Counter2"
      };

      try {
        const { data, error } = await supabase
          .from(TBL_LOG2)
          .insert([record])
          .select();

        if (error) throw error;
        log("✅ Saved", "success");
        showStatus("✅ Data berhasil disimpan!", "success");

        setTimeout(() => { resetForm(); hideStatus(); if (html5QrCode) html5QrCode.resume(); }, 1500);
      } catch (err) {
        log("❌ Save error: " + err.message, "error");
        showStatus("❌ Gagal simpan: " + err.message, "error");
      } finally {
        btnSave.disabled = false;
        btnSave.textContent = "💾 Simpan";
      }
    }

    // ==================== 📥 DOWNLOAD CSV FUNCTION ====================

    async function downloadData() {
      const btn = document.getElementById('btnDownload');
      const originalText = btn.innerHTML;
      const selectedTable = document.getElementById('counterSelect').value;

      btn.disabled = true;
      btn.innerHTML = "⏳ Mengunduh...";
      showStatus("📥 Mengambil semua data...", "");
      log("📥 Download unlimited started");

      try {
        if (!supabaseReady && !initSupabase()) throw new Error("Database tidak terhubung");

        let allData = [];
        let page = 0;
        const PAGE_SIZE = 1000; // Supabase default max
        let hasMore = true;

        // Loop fetch data sampai habis (Pagination)
        while (hasMore) {
          const from = page * PAGE_SIZE;
          const to = from + PAGE_SIZE - 1;

          // Bangun query dasar
          let query = supabase
            .from(selectedTable)
            .select('*', { count: 'exact' }) // Hitung total data
            .order('timestamps', { ascending: false })
            .range(from, to); // Ambil slice data ini

          // Terapkan filter tanggal
          query = buildDateQuery(query);

          const { data, error, count } = await query;

          if (error) throw error;

          if (data) {
            allData = allData.concat(data);
            showStatus(`📥 Loaded ${allData.length} / ${count || '?'} records...`, "");
            log(`📄 Page ${page + 1}: ${data.length} rows`);
          }

          // Cek apakah masih ada data berikutnya
          hasMore = data.length === PAGE_SIZE;
          page++;

          // Safety break (jaga-jaga jika data sangat besar)
          if (page > 50) {
            log("⚠️ Stopped at 50 pages (50k rows) for safety", "error");
            break;
          }
        }

        if (allData.length === 0) {
          showStatus("⚠️ Tidak ada data untuk diunduh", "error");
          return;
        }

        log(`✅ Total fetched: ${allData.length} records`, "success");

        // Konversi ke CSV & Download
        const csv = convertToCSV(allData);
        const filename = `cycle_count${document.getElementById('filterStart').value ? '_' + document.getElementById('filterStart').value : ''}_${new Date().toISOString().slice(0, 10)}.csv`;

        downloadCSV(csv, filename);

        showStatus(`✅ Berhasil mengunduh ${allData.length} data!`, "success");

      } catch (err) {
        log("❌ Download error: " + err.message, "error");
        showStatus("❌ Gagal download: " + err.message, "error");
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
        setTimeout(() => hideStatus(), 3000);
      }
    }

    // Helper: Convert JSON array to CSV string
    // Helper: Convert JSON array to CSV string (FIXED)
function convertToCSV(data) {
  if (!data || data.length === 0) return '';
  
  // Headers
  const headers = Object.keys(data[0]);
  const csvRows = [];
  
  // Daftar kolom yang memang bertipe timestamp (whitelist)
  const DATE_COLUMNS = ['timestamps', 'created_at', 'updated_at', 'date'];
  
  // Add header row
  csvRows.push(headers.map(h => `"${h}"`).join(','));
  
  // Add data rows
  for (const row of data) {
    const values = headers.map(header => {
      let value = row[header];
      
      // Handle null/undefined
      if (value === null || value === undefined) value = '';
      
      // ✅ FIX: Hanya format kolom yang ada di DATE_COLUMNS
      if (DATE_COLUMNS.includes(header)) {
        if (value) {
          const dateObj = new Date(value);
          // Cek validitas tanggal sebelum diformat
          if (!isNaN(dateObj.getTime())) {
            value = dateObj.toLocaleString('id-ID');
          }
        }
      }
      
      // Escape quotes dan wrap dalam tanda kutip
      value = String(value).replace(/"/g, '""');
      return `"${value}"`;
    });
    csvRows.push(values.join(','));
  }
  
  return csvRows.join('\n');
}

    // Helper: Trigger file download
    function downloadCSV(csvContent, filename) {
      // Add BOM for Excel UTF-8 support (agar karakter Indonesia tidak rusak)
      const BOM = "\uFEFF";
      const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });

      // Create download link
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);

      link.setAttribute('href', url);
      link.setAttribute('download', filename);
      link.style.visibility = 'hidden';

      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      // Cleanup
      URL.revokeObjectURL(url);
      log("💾 File downloaded: " + filename, "success");
    }
    
    // Helper: Convert JSON array to CSV string
    // Helper: Convert JSON array to CSV string (FIXED - No False Date Detection)
function convertToCSV(data) {
  if (!data || data.length === 0) return '';
  
  const headers = Object.keys(data[0]);
  const csvRows = [];
  
  // Header row
  csvRows.push(headers.map(h => `"${h}"`).join(','));
  
  // ✅ Whitelist kolom yang BENAR-BENAR bertipe tanggal
  const DATE_COLUMNS = new Set(['timestamps', 'created_at', 'updated_at', 'date']);

  for (const row of data) {
    const values = headers.map(header => {
      let val = row[header];

      // 1. Handle kosong
      if (val === null || val === undefined) {
        val = '';
      } 
      // 2. Hanya format tanggal untuk kolom yang terdaftar di whitelist
      else if (DATE_COLUMNS.has(header)) {
        const d = new Date(val);
        val = isNaN(d.getTime()) ? String(val) : d.toLocaleString('id-ID');
      } 
      // 3. Kolom lain (SKU, Deskripsi, Lokasi, dll) langsung aman sebagai string
      else {
        val = String(val);
      }

      // Escape tanda kutip untuk format CSV standar
      return `"${String(val).replace(/"/g, '""')}"`;
    });
    csvRows.push(values.join(','));
  }
  
  return csvRows.join('\n');
}
    // Helper: Trigger file download
    function downloadCSV(csvContent, filename) {
      // Add BOM for Excel UTF-8 support (agar karakter Indonesia tidak rusak)
      const BOM = "\uFEFF";
      const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });

      // Create download link
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);

      link.setAttribute('href', url);
      link.setAttribute('download', filename);
      link.style.visibility = 'hidden';

      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      // Cleanup
      URL.revokeObjectURL(url);
      log("💾 File downloaded: " + filename, "success");
    }
    // ==================== 🎨 UI FUNCTIONS ====================

    function showProductForm(product) {
      document.getElementById('inputPartNumber').value = product.partnumber;
      document.getElementById('inputDescription').value = product.partdescription || '-';
      document.getElementById('inputQty').value = '';
      document.getElementById('inputLokasi').value = '';
      document.getElementById('scanView').classList.add('hidden');
      document.getElementById('dataView').classList.remove('hidden');

      setTimeout(() => document.getElementById('inputQty').focus(), 300);
      hideStatus();
    }

    function cancelScan() {
      log("↩️ Cancel");
      document.getElementById('dataView').classList.add('hidden');
      document.getElementById('scanView').classList.remove('hidden');
      currentData = null;
      if (html5QrCode) html5QrCode.resume();
      hideStatus();
    }

    function resetForm() {
      document.getElementById('dataView').classList.add('hidden');
      document.getElementById('scanView').classList.remove('hidden');
      document.getElementById('inputLokasi').value = '';
      currentData = null;
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
      el.style.display = 'block';
      log("📢 Status: " + msg, type);
    }

    function hideStatus() {
      document.getElementById('status').style.display = 'none';
    }

    // ==================== 🚀 INIT ====================

    document.addEventListener('DOMContentLoaded', () => {
      log("📄 DOM loaded");
      initSupabase();

      document.getElementById('btnStart')?.addEventListener('click', (e) => {
        e.preventDefault(); startCamera();
      });
      document.getElementById('btnStop')?.addEventListener('click', (e) => {
        e.preventDefault(); stopCamera();
      });
      document.getElementById('btnSave')?.addEventListener('click', (e) => {
        e.preventDefault(); saveData();
      });
      document.getElementById('btnDownload')?.addEventListener('click', (e) => {
        e.preventDefault(); downloadData();
      });
      document.getElementById('btnDownload2')?.addEventListener('click', (e) => {
        e.preventDefault(); downloadData2();
      });

      document.getElementById('inputQty')?.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveData(); }
      });

      log("🚀 App initialized");
    });

    window.addEventListener('beforeunload', () => {
      if (html5QrCode) html5QrCode.stop().catch(() => { });
    });
  </script>

</body>

</html>
